<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070500" />
    <meta name="description" content="J.A.R.V.I.S. — Just A Rather Very Intelligent System. A web-based AI assistant by Gaurav Kumar & Ameen James." />
    <title>J.A.R.V.I.S. — Just A Rather Very Intelligent System</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23070500' stroke='%23F5A623' stroke-width='3'/><path d='M50 20 L50 80 M20 50 L80 50 M30 30 L70 70 M70 30 L30 70' stroke='%23F5A623' stroke-width='1.5' opacity='0.4'/><circle cx='50' cy='50' r='12' fill='none' stroke='%23F5A623' stroke-width='2'/><circle cx='50' cy='50' r='5' fill='%23F5A623'/></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Project by Gaurav Kumar & Ameen James — Revived 2026 -->

    <!-- Scan Lines Overlay -->
    <div class="scanlines" aria-hidden="true"></div>

    <!-- Boot Overlay -->
    <div class="boot-overlay" id="bootOverlay">
      <div class="boot-inner">
        <div class="boot-logo">J.A.R.V.I.S.</div>
        <div class="boot-text" id="bootText"></div>
        <div class="boot-bar"><div class="boot-progress" id="bootProgress"></div></div>
      </div>
    </div>

    <!-- Status Bar -->
    <header class="status-bar anim-slide-down">
      <div class="status-left">
        <span class="logo">J.A.R.V.I.S.</span>
        <span class="version">v2.0</span>
        <span class="divider" aria-hidden="true"></span>
        <span class="system-label">SYSTEM ONLINE</span>
      </div>
      <div class="status-right">
        <span class="status-item" id="battery" title="Battery">
          <i class="fas fa-battery-full"></i>
          <span class="status-value">--</span>
        </span>
        <span class="status-item" id="network" title="Network">
          <i class="fas fa-wifi"></i>
          <span class="status-value">ONLINE</span>
        </span>
        <span class="status-item clock-item" id="clock">
          <span class="status-value">--:--:--</span>
        </span>
      </div>
    </header>

    <!-- Main Interface -->
    <main class="main">
      <!-- Core Visualization -->
      <div class="core-container anim-fade-in">
        <div class="core-ring ring-1"></div>
        <div class="core-ring ring-2"></div>
        <div class="core-ring ring-3"></div>
        <div class="core-ring ring-4"></div>
        <div class="core-glow"></div>
        <div class="core-image">
          <img src="giphy.gif" alt="JARVIS Core" />
        </div>
        <!-- Tick marks on outer ring -->
        <svg class="core-ticks" viewBox="0 0 260 260" aria-hidden="true">
          <g stroke="rgba(245,166,35,0.25)" stroke-width="1">
            <!-- 12 major ticks every 30deg -->
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(0 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(30 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(60 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(90 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(120 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(150 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(180 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(210 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(240 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(270 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(300 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(330 130 130)" />
            <!-- 24 minor ticks every 15deg (offset by 15) -->
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(15 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(45 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(75 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(105 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(135 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(165 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(195 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(225 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(255 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(285 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(315 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(345 130 130)" />
          </g>
        </svg>
        <!-- Voice Wave Indicator -->
        <div class="voice-wave" id="voiceWave" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <!-- Status Badge -->
      <div class="status-badge anim-fade-in" id="statusBadge">STANDBY</div>

      <!-- Conversation Log -->
      <div class="conversation" id="conversation" role="log" aria-live="polite"></div>
    </main>

    <!-- Bottom Panel -->
    <div class="bottom-panel">
      <!-- Quick Actions -->
      <div class="quick-actions anim-fade-in-delayed">
        <button class="action-chip" data-command="what time is it">
          <i class="fas fa-clock"></i> Time
        </button>
        <button class="action-chip" data-command="what is the weather">
          <i class="fas fa-cloud-sun"></i> Weather
        </button>
        <button class="action-chip" data-command="tell me a joke">
          <i class="fas fa-face-laugh-beam"></i> Joke
        </button>
        <button class="action-chip" data-command="read my notes">
          <i class="fas fa-sticky-note"></i> Notes
        </button>
        <button class="action-chip" data-command="generate a password">
          <i class="fas fa-key"></i> Password
        </button>
        <button class="action-chip" data-command="what can you do">
          <i class="fas fa-circle-question"></i> Help
        </button>
      </div>

      <!-- Input Area -->
      <div class="input-area anim-slide-up">
        <button class="mic-btn" id="micBtn" aria-label="Click to speak">
          <i class="fas fa-microphone"></i>
        </button>
        <input
          type="text"
          class="text-input"
          id="textInput"
          placeholder="Type a command or click the mic..."
          autocomplete="off"
          spellcheck="false"
          aria-label="Command input"
        />
        <button class="send-btn" id="sendBtn" aria-label="Send command">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>

      <!-- Credits -->
      <p class="credits anim-fade-in-delayed">
        Built by <strong>Gaurav Kumar</strong> &amp; <strong>Ameen James</strong>
      </p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
