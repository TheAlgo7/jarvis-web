<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#010F14" />
    <meta name="description" content="J.A.R.V.I.S. — Just A Rather Very Intelligent System. A web-based AI assistant by Gaurav Kumar & Ameen James." />
    <title>J.A.R.V.I.S. — Just A Rather Very Intelligent System</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23010F14' stroke='%235D98A6' stroke-width='3'/><path d='M50 20 L50 80 M20 50 L80 50 M30 30 L70 70 M70 30 L30 70' stroke='%235D98A6' stroke-width='1.5' opacity='0.4'/><circle cx='50' cy='50' r='12' fill='none' stroke='%235D98A6' stroke-width='2'/><circle cx='50' cy='50' r='5' fill='%235D98A6'/></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Project by Gaurav Kumar & Ameen James — Revived 2026 -->

    <!-- Scan Lines Overlay -->
    <div class="scanlines" aria-hidden="true"></div>

    <!-- Boot Overlay -->
    <div class="boot-overlay" id="bootOverlay">
      <div class="boot-inner">
        <div class="boot-logo">J.A.R.V.I.S.</div>
        <div class="boot-text" id="bootText"></div>
        <div class="boot-bar"><div class="boot-progress" id="bootProgress"></div></div>
      </div>
    </div>

    <!-- Status Bar -->
    <header class="status-bar anim-slide-down">
      <div class="status-left">
        <span class="logo">J.A.R.V.I.S.</span>
        <span class="version">v3.1</span>
        <span class="divider" aria-hidden="true"></span>
        <span class="system-label">SYSTEM ONLINE</span>
      </div>
      <div class="status-right">
        <span class="status-item" id="battery" title="Battery">
          <svg aria-hidden="true" class="status-icon" width="18" height="11" viewBox="0 0 18 11" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="0.6" y="0.6" width="15.8" height="9.8" rx="1.8"/><rect x="16.6" y="3.2" width="1.4" height="4.6" rx="0.7" fill="currentColor" stroke="none"/><rect x="1.5" y="1.5" width="12" height="8" rx="1" fill="currentColor" stroke="none" id="batteryFill"/></svg>
          <span class="status-value">--</span>
        </span>
        <span class="status-item" id="network" title="Network">
          <svg aria-hidden="true" class="status-icon" width="14" height="12" viewBox="0 0 24 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1.42 7a16 16 0 0 1 21.16 0"/><path d="M5 11.55a11 11 0 0 1 14.08 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1.5" fill="currentColor" stroke="none"/></svg>
          <span class="status-value">ONLINE</span>
        </span>
        <span class="status-item clock-item" id="clock">
          <span class="status-value">--:--:--</span>
        </span>
      </div>
    </header>

    <!-- Main Interface -->
    <main class="main">
      <!-- Core Visualization -->
      <div class="core-container anim-fade-in">
        <div class="core-ring ring-1"></div>
        <div class="core-ring ring-2"></div>
        <div class="core-ring ring-3"></div>
        <div class="core-ring ring-4"></div>
        <div class="core-glow"></div>
        <div class="core-image">
          <img src="giphy.gif" alt="JARVIS Core" />
        </div>
        <!-- Tick marks on outer ring -->
        <svg class="core-ticks" viewBox="0 0 260 260" aria-hidden="true">
          <g stroke="rgba(93,152,166,0.28)" stroke-width="1">
            <!-- 12 major ticks every 30deg -->
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(0 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(30 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(60 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(90 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(120 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(150 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(180 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(210 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(240 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(270 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(300 130 130)" />
            <line x1="130" y1="5"  x2="130" y2="18"  transform="rotate(330 130 130)" />
            <!-- 24 minor ticks every 15deg (offset by 15) -->
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(15 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(45 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(75 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(105 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(135 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(165 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(195 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(225 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(255 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(285 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(315 130 130)" />
            <line x1="130" y1="5" x2="130" y2="12" stroke-width="0.5" transform="rotate(345 130 130)" />
          </g>
        </svg>
        <!-- Voice Wave Indicator -->
        <div class="voice-wave" id="voiceWave" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <!-- Status Badge -->
      <div class="status-badge anim-fade-in" id="statusBadge" role="status" aria-live="polite">STANDBY</div>

      <!-- Conversation Log -->
      <div class="conversation" id="conversation" role="log" aria-live="polite"></div>
    </main>

    <!-- Bottom Panel -->
    <div class="bottom-panel">
      <!-- Quick Actions -->
      <div class="quick-actions anim-fade-in-delayed">
        <button class="action-chip" data-command="what time is it">
          <svg aria-hidden="true" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Time
        </button>
        <button class="action-chip" data-command="what is the weather">
          <svg aria-hidden="true" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
          Weather
        </button>
        <button class="action-chip" data-command="tell me a joke">
          <svg aria-hidden="true" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9" stroke-width="3"/><line x1="15" y1="9" x2="15.01" y2="9" stroke-width="3"/></svg>
          Joke
        </button>
        <button class="action-chip" data-command="read my notes">
          <svg aria-hidden="true" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Notes
        </button>
        <button class="action-chip" data-command="generate a password">
          <svg aria-hidden="true" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5l3 3L22 7l-3-3"/></svg>
          Password
        </button>
        <button class="action-chip" data-command="what can you do">
          <svg aria-hidden="true" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-width="3"/></svg>
          Help
        </button>
      </div>

      <!-- Input Area -->
      <div class="input-area anim-slide-up">
        <button class="mic-btn" id="micBtn" aria-label="Click to speak">
          <svg aria-hidden="true" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
        </button>
        <input
          type="text"
          class="text-input"
          id="textInput"
          placeholder="Type a command or click the mic..."
          autocomplete="off"
          spellcheck="false"
          aria-label="Command input"
        />
        <button class="send-btn" id="sendBtn" aria-label="Send command">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z" fill="currentColor"/></svg>
        </button>
      </div>

      <!-- Credits -->
      <p class="credits anim-fade-in-delayed">
        Built by <strong>Gaurav Kumar</strong> &amp; <strong>Ameen James</strong>
      </p>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
